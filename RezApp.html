<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RezApp</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0b0f19;
            --glass: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-muted: #8b949e;
            --accent: #6366f1;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background: var(--bg); color: var(--text); 
            padding: 20px; padding-bottom: 100px;
            min-height: 100vh;
        }

        /* Хедер */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo { font-size: 28px; font-weight: 800; letter-spacing: -1px; background: linear-gradient(135deg, #fff, #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .layout-btn { background: var(--glass); border: 1px solid var(--border); color: white; width: 40px; height: 40px; border-radius: 12px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Категорії */
        .categories { display: flex; gap: 10px; margin-bottom: 25px; overflow-x: auto; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn { 
            background: var(--glass); border: 1px solid var(--border);
            padding: 10px 20px; border-radius: 16px; color: var(--text-muted); 
            font-size: 14px; font-weight: 600; transition: 0.2s; cursor: pointer; white-space: nowrap;
        }
        .cat-btn.active { background: white; color: black; border-color: white; }

        /* Сітка */
        .grid { display: grid; gap: 15px; }
        .grid.cols-1 { grid-template-columns: 1fr; }
        .grid.cols-2 { grid-template-columns: 1fr 1fr; }
        
        .card {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 20px; overflow: hidden; position: relative;
            cursor: pointer;
        }
        .grid.cols-1 .card { height: 250px; }
        .grid.cols-2 .card { height: 200px; }
        
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 70%;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
        }
        .card-info { position: absolute; bottom: 0; left: 0; padding: 15px; width: 100%; z-index: 2; }
        .card-tag { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #a5b4fc; margin-bottom: 5px; display: block; }
        .card-title { font-size: 18px; font-weight: 700; line-height: 1.2; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        /* ДЕТАЛЬНИЙ РЕЖИМ */
        #detailView {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 1000; overflow-y: auto;
        }
        .detail-img-box { position: relative; height: 350px; }
        .detail-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .detail-img-box::after { content:''; position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 40%, var(--bg) 100%); }
        
        .top-btns { position: absolute; top: 20px; width: 100%; padding: 0 20px; display: flex; justify-content: space-between; z-index: 10; }
        .circle-btn { background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); color: white; border: 1px solid rgba(255,255,255,0.2); width: 45px; height: 45px; border-radius: 50%; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        /* Приховане меню налаштувань */
        #actionMenu {
            display: none; position: absolute; top: 75px; right: 20px; background: rgba(20,25,40,0.95); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 16px; padding: 10px; z-index: 20; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .menu-btn { display: block; width: 100%; text-align: left; background: none; border: none; padding: 12px 20px; color: white; font-size: 15px; border-radius: 10px; cursor: pointer; }
        .menu-btn.red { color: #ff5f57; }
        
        .detail-content { padding: 25px; position: relative; z-index: 2; margin-top: -80px; }
        .detail-title { font-size: 32px; font-weight: 800; margin-bottom: 30px; line-height: 1.1; }

        .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin: 30px 0 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .section-title { font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        .reset-btn { background: var(--glass); border: 1px solid var(--border); color: white; padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 5px;}

        /* Інгредієнти (Чекбокси) */
        .check-item { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; cursor: pointer; padding: 12px; background: var(--glass); border-radius: 16px; border: 1px solid transparent; transition: 0.2s; }
        .check-item.done { opacity: 0.4; border-color: var(--border); }
        .check-item.done .check-text { text-decoration: line-through; }
        
        .custom-checkbox { width: 24px; height: 24px; border: 2px solid var(--text-muted); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.2s; }
        .check-item.done .custom-checkbox { background: var(--success); border-color: var(--success); }
        .check-item.done .custom-checkbox::after { content: '✓'; color: white; font-size: 14px; font-weight: bold; }
        
        .check-text { font-size: 16px; line-height: 1.4; padding-top: 2px; }

        /* Процес (Просто текст) */
        .plain-text-steps { font-size: 16px; line-height: 1.7; white-space: pre-line; color: rgba(255,255,255,0.9); }

        /* Модалка додавання/редагування */
        #formModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.95); backdrop-filter: blur(15px); z-index: 2000;
            padding: 20px; overflow-y: auto;
        }
        .form-inner { max-width: 500px; margin: 20px auto; }
        input, textarea, select { 
            width: 100%; padding: 18px; margin-bottom: 15px; 
            background: var(--glass); border: 1px solid var(--border); 
            border-radius: 18px; color: white; font-size: 16px; outline: none;
        }
        .btn-save { background: white; color: black; padding: 20px; border-radius: 18px; width: 100%; font-weight: 800; border: none; margin-top: 10px; font-size: 16px; cursor: pointer; }

        .fab {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: white; color: black; padding: 18px 35px; border-radius: 30px; border: none;
            font-size: 16px; font-weight: 700; box-shadow: 0 10px 40px rgba(0,0,0,0.6); z-index: 100; cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">RezApp</div>
        <button class="layout-btn" onclick="toggleLayout()">▦</button>
    </header>

    <div class="categories">
        <button class="cat-btn active" onclick="filter('All')">Всі</button>
        <button class="cat-btn" onclick="filter('Загальне')">Загальне</button>
        <button class="cat-btn" onclick="filter('Сніданок')">Сніданок</button>
        <button class="cat-btn" onclick="filter('Протеїн')">Протеїн 💪</button>
    </div>

    <div class="grid cols-2" id="grid"></div>

    <button class="fab" onclick="openForm()">+ Додати рецепт</button>

    <div id="detailView">
        <div class="top-btns">
            <button class="circle-btn" onclick="closeDetail()">✕</button>
            <button class="circle-btn" onclick="toggleMenu()">⋮</button>
        </div>
        
        <div id="actionMenu">
            <button class="menu-btn" onclick="triggerEdit()">✎ Редагувати</button>
            <button class="menu-btn red" onclick="triggerDelete()">✕ Видалити</button>
        </div>

        <div class="detail-img-box">
            <img id="detImg" src="">
        </div>
        
        <div class="detail-content">
            <div id="detTag" class="card-tag" style="margin-bottom: 10px;"></div>
            <div id="detTitle" class="detail-title"></div>
            
            <div class="section-header">
                <div class="section-title">Інгредієнти</div>
                <button class="reset-btn" onclick="resetIngredients()">🔄 Скинути</button>
            </div>
            <div id="detIng"></div>
            
            <div class="section-header" style="margin-top: 40px;">
                <div class="section-title">Приготування</div>
            </div>
            <div id="detSteps" class="plain-text-steps"></div>
        </div>
    </div>

    <div id="formModal">
        <div class="form-inner">
            <h2 id="formTitle" style="margin-bottom:25px;">Новий рецепт</h2>
            <select id="recipeCat">
                <option value="Загальне">Загальне</option>
                <option value="Сніданок">Сніданок</option>
                <option value="Протеїн">Протеїн 💪</option>
            </select>
            <input type="text" id="recipeTitle" placeholder="Назва страви">
            <input type="text" id="recipePhoto" placeholder="Посилання на фото (URL)">
            <textarea id="recipeIng" rows="5" placeholder="Інгредієнти (Кожен з нового рядка)"></textarea>
            <textarea id="recipeSteps" rows="6" placeholder="Як готувати (Просто текст)"></textarea>
            
            <button class="btn-save" onclick="saveRecipe()">Зберегти</button>
            <button onclick="closeForm()" style="background:none; border:none; color:var(--text-muted); width:100%; padding:20px; font-weight:600;">Скасувати</button>
        </div>
    </div>

    <script>
        // Твій Config
        const firebaseConfig = {
          apiKey: "AIzaSyDKokz-gKpWZJV__yiYz2MzbybqZX1n-Ws",
          authDomain: "rezapp-42b6f.firebaseapp.com",
          projectId: "rezapp-42b6f",
          storageBucket: "rezapp-42b6f.firebasestorage.app",
          messagingSenderId: "23140533473",
          appId: "1:23140533473:web:66b995eee326b19cd423a0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // ВШИТИЙ КЛЮЧ
        const SECRET_KEY = "myrezept7";
        
        let allRecipes = [];
        let currentActiveCat = 'All';
        let currentDetailId = null; 
        let currentEditId = null;

        window.onload = () => { 
            applySavedLayout();
            initCloud(); 
        };

        function applySavedLayout() {
            const cols = localStorage.getItem('rezapp_layout') || '2';
            const grid = document.getElementById('grid');
            grid.className = `grid cols-${cols}`;
        }

        function toggleLayout() {
            let cols = localStorage.getItem('rezapp_layout') || '2';
            cols = cols === '1' ? '2' : '1';
            localStorage.setItem('rezapp_layout', cols);
            applySavedLayout();
        }

        function initCloud() {
            // Додав обробник помилок завантаження бази
            db.collection(SECRET_KEY).orderBy('createdAt', 'desc').onSnapshot(
                snap => {
                    allRecipes = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    renderGrid();
                    
                    if(currentDetailId) {
                        const exists = allRecipes.find(r => r.id === currentDetailId);
                        if(exists) {
                            document.getElementById('detTitle').innerText = exists.title;
                            document.getElementById('detImg').src = exists.photo || 'https://via.placeholder.com/500';
                            document.getElementById('detSteps').innerText = exists.steps;
                        } else {
                            closeDetail();
                        }
                    }
                },
                error => {
                    alert("Помилка завантаження з бази: " + error.message);
                    console.error("Firebase Error:", error);
                }
            );
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            const filtered = currentActiveCat === 'All' ? allRecipes : allRecipes.filter(r => r.category === currentActiveCat);
            
            if (filtered.length === 0) {
                grid.innerHTML = '<p style="text-align:center; opacity:0.3; margin-top:20px; grid-column: 1 / -1;">Поки що пусто. Додай щось смачненьке!</p>';
                return;
            }

            grid.innerHTML = filtered.map(r => `
                <div class="card" onclick="openDetail('${r.id}')">
                    <img src="${r.photo || 'https://images.unsplash.com/photo-1495521821757-a1efb6729352?q=80&w=600'}">
                    <div class="card-info">
                        <span class="card-tag">${r.category}</span>
                        <div class="card-title">${r.title}</div>
                    </div>
                </div>
            `).join('');
        }

        function openDetail(id) {
            currentDetailId = id;
            const r = allRecipes.find(x => x.id === id);
            
            document.getElementById('detImg').src = r.photo || 'https://images.unsplash.com/photo-1495521821757-a1efb6729352?q=80&w=800';
            document.getElementById('detTag').innerText = r.category;
            document.getElementById('detTitle').innerText = r.title;
            document.getElementById('detSteps').innerText = r.steps || "Немає опису.";
            
            renderIngredients(r.ingredients, id);
            document.getElementById('detailView').style.display = 'block';
        }

        function renderIngredients(textBlock, recipeId) {
            const container = document.getElementById('detIng');
            if(!textBlock) { container.innerHTML = '<div class="check-text">Немає інгредієнтів</div>'; return; }
            
            const lines = textBlock.split('\n').filter(l => l.trim().length > 0);
            const savedChecks = JSON.parse(localStorage.getItem('rezapp_chk_' + recipeId) || '[]');

            container.innerHTML = lines.map((line, idx) => {
                const isChecked = savedChecks.includes(idx) ? 'done' : '';
                return `
                <div class="check-item ${isChecked}" onclick="toggleCheck('${recipeId}', ${idx}, this)">
                    <div class="custom-checkbox"></div>
                    <div class="check-text">${line}</div>
                </div>`;
            }).join('');
        }

        function toggleCheck(recipeId, idx, element) {
            element.classList.toggle('done');
            let savedChecks = JSON.parse(localStorage.getItem('rezapp_chk_' + recipeId) || '[]');
            if(savedChecks.includes(idx)) {
                savedChecks = savedChecks.filter(i => i !== idx); 
            } else {
                savedChecks.push(idx); 
            }
            localStorage.setItem('rezapp_chk_' + recipeId, JSON.stringify(savedChecks));
        }

        function resetIngredients() {
            if(!currentDetailId) return;
            localStorage.removeItem('rezapp_chk_' + currentDetailId);
            const r = allRecipes.find(x => x.id === currentDetailId);
            renderIngredients(r.ingredients, currentDetailId);
        }

        function closeDetail() { 
            document.getElementById('detailView').style.display = 'none'; 
            document.getElementById('actionMenu').style.display = 'none';
            currentDetailId = null; 
        }

        function toggleMenu() {
            const menu = document.getElementById('actionMenu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function openForm(isEdit = false) {
            document.getElementById('formModal').style.display = 'block';
            document.getElementById('actionMenu').style.display = 'none';
            if(!isEdit) {
                currentEditId = null;
                document.getElementById('formTitle').innerText = "Новий рецепт";
                ['recipeTitle', 'recipePhoto', 'recipeIng', 'recipeSteps'].forEach(id => document.getElementById(id).value = '');
            }
        }
        function closeForm() { document.getElementById('formModal').style.display = 'none'; }

        function triggerEdit() {
            const r = allRecipes.find(x => x.id === currentDetailId);
            currentEditId = r.id;
            document.getElementById('formTitle').innerText = "Редагувати";
            document.getElementById('recipeCat').value = r.category;
            document.getElementById('recipeTitle').value = r.title;
            document.getElementById('recipePhoto').value = r.photo;
            document.getElementById('recipeIng').value = r.ingredients;
            document.getElementById('recipeSteps').value = r.steps;
            openForm(true);
        }

        async function triggerDelete() {
            if(confirm('Видалити цей рецепт назавжди?')) {
                try {
                    await db.collection(SECRET_KEY).doc(currentDetailId).delete();
                    localStorage.removeItem('rezapp_chk_' + currentDetailId); 
                    closeDetail();
                } catch(error) {
                    alert("Помилка видалення: " + error.message);
                }
            }
        }

        async function saveRecipe() {
            const data = {
                title: document.getElementById('recipeTitle').value,
                photo: document.getElementById('recipePhoto').value,
                category: document.getElementById('recipeCat').value,
                ingredients: document.getElementById('recipeIng').value,
                steps: document.getElementById('recipeSteps').value,
                createdAt: new Date()
            };

            if(!data.title) return alert("Введіть назву!");

            // Блок відлову помилок
            try {
                if (currentEditId) {
                    await db.collection(SECRET_KEY).doc(currentEditId).update(data);
                } else {
                    await db.collection(SECRET_KEY).add(data);
                }
                closeForm();
            } catch (error) {
                alert("Помилка збереження! Перевір інтернет або правила Firebase. Деталі: " + error.message);
                console.error("Save Error:", error);
            }
        }

        function filter(cat) {
            currentActiveCat = cat;
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.toggle('active', b.innerText.includes(cat) || (cat==='All' && b.innerText==='Всі'));
            });
            renderGrid();
        }
    </script>
</body>
</html>
