<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>RezApp</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #000000;
            --surface: #1c1c1e;
            --surface-light: #2c2c2e;
            --text-main: #ffffff;
            --text-sec: #8e8e93;
            --accent: #0a84ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }

        html, body {
            background-color: var(--bg-base);
            color: var(--text-main);
            /* Використовуємо 100dvh для динамічної висоти на мобільних */
            height: 100dvh;
            overflow: hidden;
            width: 100vw;
        }

        svg { stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

        /* Головний контейнер додатку */
        .app-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Верхня частина з відступом під камеру */
        header { 
            padding: calc(20px + env(safe-area-inset-top)) 20px 20px 20px; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 50;
        }
        .header-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px;}
        .date-sub { font-size: 13px; color: var(--text-sec); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; display: block;}
        .logo { font-size: 34px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
        
        /* Зона контенту зі скролом */
        .main-scroll {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            padding: 0 20px calc(100px + env(safe-area-inset-bottom)) 20px;
            -webkit-overflow-scrolling: touch;
        }

        /* Категорії */
        .categories { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; padding-bottom: 10px; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn { 
            background: var(--surface); border: none;
            padding: 10px 20px; border-radius: 12px; color: var(--text-sec); 
            font-size: 15px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.2s;
        }
        .cat-btn.active { background: var(--text-main); color: var(--bg-base); }

        /* Картки в стилі App Store */
        .grid { display: flex; flex-direction: column; gap: 30px; margin-top: 10px;}
        
        .card {
            width: 100%; height: 420px;
            border-radius: 28px; overflow: hidden; position: relative;
            cursor: pointer; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .card:active { transform: scale(0.95); }
        
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        }
        
        .card-info { position: absolute; bottom: 0; left: 0; padding: 24px; width: 100%; z-index: 2; }
        .card-tag { font-size: 12px; font-weight: 700; text-transform: uppercase; color: rgba(255,255,255,0.7); letter-spacing: 1px; margin-bottom: 8px; display: block; }
        .card-title { font-size: 28px; font-weight: 800; line-height: 1.1; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }

        /* Нижня панель навігації (Tab Bar) */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(28, 28, 30, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-top: 0.5px solid rgba(255,255,255,0.1);
            padding: 10px 20px calc(10px + env(safe-area-inset-bottom)) 20px;
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .tab-btn {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: var(--text-sec); background: none; border: none; font-size: 10px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .tab-btn svg { width: 24px; height: 24px; }
        .tab-btn.active { color: var(--accent); }

        /* Модальні вікна (Full Screen Sheets) */
        .sheet {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: var(--bg-base); z-index: 2000;
            transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex; flex-direction: column;
        }
        .sheet.show { transform: translateY(0); }
        
        .sheet-header {
            padding: calc(15px + env(safe-area-inset-top)) 20px 15px 20px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 10;
        }
        .sheet-title { font-size: 17px; font-weight: 600; }
        .close-btn { color: var(--accent); font-size: 17px; font-weight: 600; background: none; border: none; cursor: pointer; }
        
        .sheet-content { flex: 1; overflow-y: auto; padding-bottom: calc(40px + env(safe-area-inset-bottom)); }

        /* Деталі рецепта */
        .recipe-hero { width: 100%; height: 400px; position: relative; }
        .recipe-hero img { width: 100%; height: 100%; object-fit: cover; }
        .recipe-hero::after { content: ''; position: absolute; bottom:0; left:0; width:100%; height:60%; background: linear-gradient(to top, var(--bg-base), transparent); }
        
        .recipe-body { padding: 0 20px; margin-top: -60px; position: relative; z-index: 2;}
        .r-tag { font-size: 13px; font-weight: 700; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .r-title { font-size: 36px; font-weight: 800; line-height: 1.1; margin-bottom: 30px; letter-spacing: -1px;}

        .action-btns { display: flex; gap: 10px; margin-bottom: 40px; }
        .a-btn { flex: 1; padding: 14px; border-radius: 14px; border: none; font-size: 15px; font-weight: 600; display: flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer; }
        .a-btn.edit { background: var(--surface); color: var(--text-main); }
        .a-btn.del { background: rgba(255, 69, 58, 0.15); color: #ff453a; }

        .sec-title { font-size: 22px; font-weight: 700; margin: 0 0 20px 0; border-bottom: 0.5px solid var(--surface); padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center;}
        
        /* Чекбокси Apple Reminders Style */
        .check-item { display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 0.5px solid var(--surface); cursor: pointer; transition: 0.2s;}
        .check-item:active { opacity: 0.5; }
        .circle-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--text-sec); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.2s;}
        .circle-check svg { width: 12px; height: 12px; stroke: var(--bg-base); opacity: 0; stroke-width: 3;}
        
        .check-item.done .circle-check { background: var(--accent); border-color: var(--accent); }
        .check-item.done .circle-check svg { opacity: 1; }
        .check-item.done .check-text { color: var(--text-sec); text-decoration: line-through; }
        .check-text { font-size: 17px; font-weight: 500; }

        .steps-text { font-size: 17px; line-height: 1.6; color: rgba(255,255,255,0.9); }

        /* Форма */
        .form-wrap { padding: 20px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-sec); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; padding-left: 5px;}
        input, textarea, select { 
            width: 100%; padding: 18px 20px; background: var(--surface); border: none; 
            border-radius: 16px; color: var(--text-main); font-size: 17px; outline: none; -webkit-appearance: none;
        }
        input:focus, textarea:focus, select:focus { background: var(--surface-light); }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .btn-submit { 
            background: var(--accent); color: white; padding: 20px; border-radius: 16px; 
            width: 100%; font-weight: 700; border: none; font-size: 17px; margin-top: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="header-top">
                <div>
                    <span class="date-sub" id="currentDate">Сьогодні</span>
                    <div class="logo">RezApp</div>
                </div>
            </div>
            
            <div class="categories">
                <button class="cat-btn active" onclick="filter('All')">Всі</button>
                <button class="cat-btn" onclick="filter('Загальне')">Загальне</button>
                <button class="cat-btn" onclick="filter('Сніданок')">Сніданок</button>
                <button class="cat-btn" onclick="filter('Протеїн')">Протеїн</button>
            </div>
        </header>

        <div class="main-scroll" id="grid">
            </div>

        <div class="tab-bar">
            <button class="tab-btn active" onclick="closeAll()">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                Головна
            </button>
            <button class="tab-btn" onclick="openForm()">
                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Додати
            </button>
        </div>
    </div>

    <div id="detailSheet" class="sheet">
        <div class="sheet-header">
            <div style="width: 60px;"></div> <div class="sheet-title">Рецепт</div>
            <button class="close-btn" style="width: 60px; text-align: right;" onclick="closeDetail()">Готово</button>
        </div>
        <div class="sheet-content">
            <div class="recipe-hero"><img id="detImg" src=""></div>
            <div class="recipe-body">
                <div class="r-tag"><span id="detTag"></span> • <span id="detPortion"></span></div>
                <div class="r-title" id="detTitle"></div>
                
                <div class="action-btns">
                    <button class="a-btn edit" onclick="triggerEdit()">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        Редагувати
                    </button>
                    <button class="a-btn del" onclick="triggerDelete()">
                        <svg viewBox="0 0 24 24" width="18" height="18"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        Видалити
                    </button>
                </div>

                <div class="sec-title">
                    Інгредієнти
                    <button onclick="resetIngredients()" style="background:none; border:none; color:var(--accent); font-size:14px; font-weight:600;">Очистити</button>
                </div>
                <div id="detIng" style="margin-bottom: 40px;"></div>

                <div class="sec-title">Приготування</div>
                <div id="detSteps" class="steps-text"></div>
            </div>
        </div>
    </div>

    <div id="formSheet" class="sheet">
        <div class="sheet-header">
            <button class="close-btn" style="width: 80px; text-align: left; color: var(--text-main);" onclick="closeForm()">Скасувати</button>
            <div class="sheet-title" id="formTitle">Новий запис</div>
            <div style="width: 80px;"></div>
        </div>
        <div class="sheet-content form-wrap">
            <div class="input-group">
                <label>Назва страви</label>
                <input type="text" id="recipeTitle" placeholder="Введіть назву">
            </div>

            <div class="row-2">
                <div class="input-group">
                    <label>Категорія</label>
                    <select id="recipeCat">
                        <option value="Загальне">Загальне</option>
                        <option value="Сніданок">Сніданок</option>
                        <option value="Протеїн">Протеїн</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Порція</label>
                    <select id="recipePortion">
                        <option value="1 порція">1 порція</option>
                        <option value="2 порції" selected>2 порції</option>
                        <option value="3 порції">3 порції</option>
                        <option value="4 порції">4 порції</option>
                        <option value="Компанія">Компанія</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>Фото (URL)</label>
                <input type="text" id="recipePhoto" placeholder="https://...">
            </div>

            <div class="input-group">
                <label>Інгредієнти (З нового рядка)</label>
                <textarea id="recipeIng" rows="5" placeholder="Яйця&#10;Сир&#10;Молоко"></textarea>
            </div>

            <div class="input-group">
                <label>Процес</label>
                <textarea id="recipeSteps" rows="6" placeholder="Опис кроків..."></textarea>
            </div>
            
            <button class="btn-submit" onclick="saveRecipe()">Зберегти</button>
        </div>
    </div>

    <script>
        // Встановлення дати
        const options = { weekday: 'long', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('uk-UA', options);

        const firebaseConfig = {
          apiKey: "AIzaSyDKokz-gKpWZJV__yiYz2MzbybqZX1n-Ws",
          authDomain: "rezapp-42b6f.firebaseapp.com",
          projectId: "rezapp-42b6f",
          storageBucket: "rezapp-42b6f.firebasestorage.app",
          messagingSenderId: "23140533473",
          appId: "1:23140533473:web:66b995eee326b19cd423a0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const SECRET_KEY = "myrezept7";
        
        let allRecipes = [];
        let currentActiveCat = 'All';
        let currentDetailId = null; 
        let currentEditId = null;

        window.onload = () => { initCloud(); };

        function initCloud() {
            db.collection(SECRET_KEY).orderBy('createdAt', 'desc').onSnapshot(
                snap => {
                    allRecipes = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    renderGrid();
                    if(currentDetailId) {
                        const exists = allRecipes.find(r => r.id === currentDetailId);
                        if(exists) {
                            document.getElementById('detTitle').innerText = exists.title;
                            document.getElementById('detImg').src = exists.photo || 'https://via.placeholder.com/500';
                            document.getElementById('detSteps').innerText = exists.steps;
                            document.getElementById('detPortion').innerText = exists.portion || '2 порції';
                        } else { closeDetail(); }
                    }
                },
                error => { alert("Помилка бази: " + error.message); }
            );
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            const filtered = currentActiveCat === 'All' ? allRecipes : allRecipes.filter(r => r.category === currentActiveCat);
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div style="text-align:center; color:var(--text-sec); margin-top:80px; font-weight: 500;">Немає рецептів</div>';
                return;
            }

            grid.innerHTML = filtered.map(r => `
                <div class="card" onclick="openDetail('${r.id}')">
                    <img src="${r.photo || 'https://images.unsplash.com/photo-1495521821757-a1efb6729352?q=80&w=600'}">
                    <div class="card-info">
                        <span class="card-tag">${r.category}</span>
                        <div class="card-title">${r.title}</div>
                    </div>
                </div>
            `).join('');
        }

        function openDetail(id) {
            currentDetailId = id;
            const r = allRecipes.find(x => x.id === id);
            
            document.getElementById('detImg').src = r.photo || 'https://images.unsplash.com/photo-1495521821757-a1efb6729352?q=80&w=800';
            document.getElementById('detTag').innerText = r.category;
            document.getElementById('detPortion').innerText = r.portion || '2 порції';
            document.getElementById('detTitle').innerText = r.title;
            document.getElementById('detSteps').innerText = r.steps || "Немає опису.";
            
            renderIngredients(r.ingredients, id);
            document.getElementById('detailSheet').classList.add('show');
        }

        function renderIngredients(textBlock, recipeId) {
            const container = document.getElementById('detIng');
            if(!textBlock) { container.innerHTML = '<div style="color:var(--text-sec)">Немає даних</div>'; return; }
            
            const lines = textBlock.split('\n').filter(l => l.trim().length > 0);
            const savedChecks = JSON.parse(localStorage.getItem('rezapp_chk_' + recipeId) || '[]');

            container.innerHTML = lines.map((line, idx) => {
                const isChecked = savedChecks.includes(idx) ? 'done' : '';
                return `
                <div class="check-item ${isChecked}" onclick="toggleCheck('${recipeId}', ${idx}, this)">
                    <div class="circle-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
                    <div class="check-text">${line}</div>
                </div>`;
            }).join('');
        }

        function toggleCheck(recipeId, idx, element) {
            element.classList.toggle('done');
            let savedChecks = JSON.parse(localStorage.getItem('rezapp_chk_' + recipeId) || '[]');
            if(savedChecks.includes(idx)) {
                savedChecks = savedChecks.filter(i => i !== idx); 
            } else { savedChecks.push(idx); }
            localStorage.setItem('rezapp_chk_' + recipeId, JSON.stringify(savedChecks));
        }

        function resetIngredients() {
            if(!currentDetailId) return;
            localStorage.removeItem('rezapp_chk_' + currentDetailId);
            const r = allRecipes.find(x => x.id === currentDetailId);
            renderIngredients(r.ingredients, currentDetailId);
        }

        function closeDetail() { 
            document.getElementById('detailSheet').classList.remove('show');
            setTimeout(() => { currentDetailId = null; }, 500);
        }

        function openForm(isEdit = false) {
            if(!isEdit) {
                currentEditId = null;
                document.getElementById('formTitle').innerText = "Новий запис";
                ['recipeTitle', 'recipePhoto', 'recipeIng', 'recipeSteps'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('recipePortion').value = '2 порції';
            }
            document.getElementById('formSheet').classList.add('show');
        }
        
        function closeForm() { document.getElementById('formSheet').classList.remove('show'); }

        function triggerEdit() {
            const r = allRecipes.find(x => x.id === currentDetailId);
            currentEditId = r.id;
            document.getElementById('formTitle').innerText = "Редагувати";
            document.getElementById('recipeCat').value = r.category;
            document.getElementById('recipePortion').value = r.portion || '2 порції';
            document.getElementById('recipeTitle').value = r.title;
            document.getElementById('recipePhoto').value = r.photo;
            document.getElementById('recipeIng').value = r.ingredients;
            document.getElementById('recipeSteps').value = r.steps;
            
            closeDetail();
            setTimeout(() => { openForm(true); }, 300);
        }

        async function triggerDelete() {
            if(confirm('Видалити цей рецепт?')) {
                try {
                    await db.collection(SECRET_KEY).doc(currentDetailId).delete();
                    localStorage.removeItem('rezapp_chk_' + currentDetailId); 
                    closeDetail();
                } catch(error) { alert("Помилка: " + error.message); }
            }
        }

        async function saveRecipe() {
            const data = {
                title: document.getElementById('recipeTitle').value,
                photo: document.getElementById('recipePhoto').value,
                category: document.getElementById('recipeCat').value,
                portion: document.getElementById('recipePortion').value,
                ingredients: document.getElementById('recipeIng').value,
                steps: document.getElementById('recipeSteps').value,
                createdAt: new Date()
            };

            if(!data.title) return alert("Введіть назву!");

            try {
                if (currentEditId) {
                    await db.collection(SECRET_KEY).doc(currentEditId).update(data);
                } else {
                    await db.collection(SECRET_KEY).add(data);
                }
                closeForm();
            } catch (error) { alert("Помилка збереження!"); }
        }

        function filter(cat) {
            currentActiveCat = cat;
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.toggle('active', b.innerText === cat || (cat === 'All' && b.innerText === 'Всі'));
            });
            renderGrid();
        }

        function closeAll() {
            closeDetail();
            closeForm();
        }
    </script>
</body>
</html>
