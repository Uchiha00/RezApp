<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>RezApp</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-absolute: #000000;
            --glass-card: rgba(25, 25, 30, 0.45);
            --glass-strong: rgba(20, 20, 25, 0.65);
            
            --border: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(255, 255, 255, 0.15);
            
            --text-main: #ffffff;
            --text-sec: #9ca3af;
            --success: #ffffff;
        }

        html, body { 
            height: 100dvh; width: 100vw;
            margin: 0; padding: 0; 
            background-color: var(--bg-absolute);
            color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            overflow-x: hidden;
        }

        /* Анімовані світлові плями для ефекту Гласморфізму */
        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; z-index: -1; pointer-events: none;
            background: 
                radial-gradient(circle at 15% 40%, rgba(60, 40, 110, 0.25), transparent 45%),
                radial-gradient(circle at 85% 80%, rgba(30, 70, 110, 0.2), transparent 50%);
            animation: pulseBg 12s infinite alternate ease-in-out;
        }
        @keyframes pulseBg {
            0% { transform: scale(1) translateY(0); }
            100% { transform: scale(1.1) translateY(-30px); }
        }

        svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }

        .app-container {
            height: 100dvh; overflow-y: auto; overflow-x: hidden;
            padding-bottom: calc(140px + env(safe-area-inset-bottom));
        }

        /* Хедер */
        header { 
            position: sticky; top: 0; z-index: 50;
            padding: calc(15px + env(safe-area-inset-top)) 20px 15px 20px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-size: 30px; font-weight: 800; letter-spacing: -1px; display: flex; align-items: center; gap: 10px;}
        .logo svg { width: 28px; height: 28px; stroke-width: 2.5; }

        /* Категорії */
        .categories-wrap { padding: 25px 0 20px 20px; }
        .categories { display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none; padding-right: 20px; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 12px 24px; border-radius: 100px; color: var(--text-sec); 
            font-size: 15px; font-weight: 600; transition: 0.3s; cursor: pointer; white-space: nowrap;
        }
        .cat-btn.active { background: #fff; color: #000; box-shadow: 0 4px 15px rgba(255,255,255,0.2); border-color: #fff; }

        /* Скляні Картки */
        .grid { display: flex; flex-direction: column; gap: 20px; padding: 0 20px; }
        
        .card {
            display: flex; align-items: center; gap: 18px;
            background: var(--glass-card); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-top: 1px solid rgba(255,255,255,0.15); 
            border-radius: 28px; padding: 14px;
            cursor: pointer; transition: 0.3s;
            opacity: 0; animation: slideInUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .card:active { transform: scale(0.96); background: var(--glass-strong); }
        
        @keyframes slideInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* Збільшені фото в списку */
        .card-img-wrap {
            width: 130px; height: 130px; border-radius: 22px; overflow: hidden; flex-shrink: 0;
            background: #111; position: relative;
        }
        .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .card:hover .card-img-wrap img { transform: scale(1.08); }
        
        .card-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .card-title { font-size: 20px; font-weight: 700; line-height: 1.25; color: #fff; margin-bottom: 12px; letter-spacing: -0.5px; }
        
        .tags-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .card-tag { 
            font-size: 11px; font-weight: 700; text-transform: uppercase; 
            background: rgba(255,255,255,0.1); padding: 6px 10px; border-radius: 8px; 
            color: #fff; letter-spacing: 0.5px;
            display: flex; align-items: center; gap: 4px;
        }
        .card-tag svg { width: 12px; height: 12px; stroke-width: 2.5;}

        /* Вікна (Модалки) */
        .ios-sheet {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: var(--bg-absolute); z-index: 1000; overflow-y: auto; overflow-x: hidden;
            transform: translateY(100%); transition: transform 0.45s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .ios-sheet.show { transform: translateY(0); }

        /* Детальний вигляд (ПРИБИТО ДО ВЕРХУ) */
        .detail-img-box { 
            position: relative; 
            height: 55vh; /* Фото тепер займає більше половини екрану */
            width: 100vw; 
            margin: 0; padding: 0; top: 0;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; 
            overflow: hidden; 
        }
        .detail-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .detail-img-box::after { 
            content:''; position: absolute; top:0; left:0; width:100%; height:100%; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 40%, rgba(0,0,0,0.95) 100%); 
        }
        
        .top-btns { 
            position: absolute; 
            top: calc(15px + env(safe-area-inset-top)); /* Кнопки відступають від камери */
            width: 100%; padding: 0 20px; display: flex; justify-content: space-between; z-index: 10; 
        }
        .circle-btn { 
            background: rgba(255,255,255,0.1); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            color: white; border: 1px solid rgba(255,255,255,0.2); 
            width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;
        }
        .circle-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.25); }

        #actionMenu {
            display: none; position: absolute; top: calc(75px + env(safe-area-inset-top)); right: 20px; 
            background: rgba(25,25,30,0.85); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-glow); border-radius: 20px; padding: 10px; z-index: 20; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.9); min-width: 200px;
        }
        .menu-btn { 
            display: flex; align-items: center; gap: 14px; width: 100%; text-align: left; 
            background: none; border: none; padding: 16px; color: var(--text-main); 
            font-size: 16px; border-radius: 14px; cursor: pointer; font-weight: 600;
        }
        .menu-btn.red { color: #ff3b30; }
        .menu-btn.red svg { stroke: #ff3b30; }
        
        .detail-content { padding: 0 24px calc(100px + env(safe-area-inset-bottom)) 24px; position: relative; z-index: 2; margin-top: -60px; }
        .detail-title { font-size: 38px; font-weight: 800; margin: 15px 0 30px 0; line-height: 1.1; letter-spacing: -1.5px; }

        .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin: 45px 0 24px; }
        .section-title { font-size: 22px; color: var(--text-main); font-weight: 800; display: flex; align-items: center; gap: 12px;}
        .section-title svg { color: var(--text-sec); stroke-width: 2;}
        
        .text-btn { 
            background: rgba(255,255,255,0.08); border: none; color: var(--text-main); 
            font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; 
            padding: 8px 16px; border-radius: 100px; transition: 0.2s;
        }
        .text-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.15); }

        /* Інгредієнти */
        .check-item { 
            display: flex; align-items: flex-start; gap: 16px; margin-bottom: 14px; cursor: pointer; 
            padding: 22px; background: var(--glass-card); border-radius: 24px; 
            border: 1px solid var(--border); transition: 0.3s; 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }
        .check-item:active { transform: scale(0.98); background: var(--glass-strong); }
        .check-item.done { opacity: 0.4; border-color: transparent; }
        .check-item.done .check-text { text-decoration: line-through; color: var(--text-sec); }
        
        .custom-checkbox { 
            width: 28px; height: 28px; border: 2px solid var(--text-sec); border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.2s; 
        }
        .custom-checkbox svg { opacity: 0; width: 16px; height: 16px; stroke-width: 4; transform: scale(0.3); transition: 0.3s; }
        .check-item.done .custom-checkbox { background: var(--text-main); border-color: var(--text-main); color: var(--bg-absolute); }
        .check-item.done .custom-checkbox svg { opacity: 1; transform: scale(1); }
        
        .check-text { font-size: 17px; line-height: 1.5; padding-top: 2px; font-weight: 600; }

        /* Процес */
        .plain-text-steps { 
            font-size: 18px; line-height: 1.8; white-space: pre-line; color: rgba(255,255,255,0.95); 
            background: var(--glass-card); backdrop-filter: blur(15px); padding: 28px; border-radius: 30px; border: 1px solid var(--border);
        }

        /* Форма */
        .form-header { 
            padding: calc(20px + env(safe-area-inset-top)) 20px 20px 20px;
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 10;
            border-bottom: 1px solid var(--border);
        }
        .form-header h2 { font-size: 30px; font-weight: 800; letter-spacing: -1px;}
        .form-scroll-area { padding: 30px 20px calc(120px + env(safe-area-inset-bottom)) 20px; }
        
        .input-group { margin-bottom: 26px; }
        .input-label { font-size: 12px; color: var(--text-sec); margin-bottom: 12px; display: block; font-weight: 700; padding-left: 6px; text-transform: uppercase; letter-spacing: 1px;}
        
        input, textarea, select { 
            width: 100%; padding: 22px 24px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
            border-radius: 22px; color: var(--text-main); font-size: 17px; outline: none; transition: 0.3s;
            -webkit-appearance: none; font-weight: 600; backdrop-filter: blur(10px);
        }
        input:focus, textarea:focus, select:focus { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.1); }
        
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        
        .btn-main { 
            background: var(--text-main); color: var(--bg-absolute); padding: 24px; border-radius: 24px; 
            width: 100%; font-weight: 800; border: none; font-size: 18px; cursor: pointer; margin-top: 20px; transition: 0.3s;
            box-shadow: 0 10px 40px rgba(255,255,255,0.15);
        }
        .btn-main:active { transform: scale(0.96); }
        
        /* КРУГЛА КОМПАКТНА КНОПКА (+) ЗІ СКЛОМ */
        .fab {
            position: fixed; bottom: calc(30px + env(safe-area-inset-bottom)); right: 25px;
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.3);
            color: var(--text-main); 
            width: 65px; height: 65px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); z-index: 90; 
            cursor: pointer; transition: 0.3s;
        }
        .fab svg { width: 32px; height: 32px; stroke-width: 2; }
        .fab:active { transform: scale(0.9); background: rgba(255,255,255,0.25); }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>

    <div class="app-container">
        <header>
            <div class="logo">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                RezApp
            </div>
        </header>

        <div class="categories-wrap">
            <div class="categories">
                <button class="cat-btn active" onclick="filter('All')">Всі рецепти</button>
                <button class="cat-btn" onclick="filter('Загальне')">Загальне</button>
                <button class="cat-btn" onclick="filter('Сніданок')">Сніданок</button>
                <button class="cat-btn" onclick="filter('Протеїн')">Протеїн</button>
            </div>
        </div>

        <div class="grid" id="grid"></div>
    </div>

    <button class="fab" onclick="openForm()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>

    <div id="detailView" class="ios-sheet">
        <div class="top-btns">
            <button class="circle-btn" onclick="closeDetail()">
                <svg viewBox="0 0 24 24"><path d="M19 12H5"></path><polyline points="12 19 5 12 12 5"></polyline></svg>
            </button>
            <button class="circle-btn" onclick="toggleMenu()">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1.5"></circle><circle cx="12" cy="5" r="1.5"></circle><circle cx="12" cy="19" r="1.5"></circle></svg>
            </button>
        </div>
        
        <div id="actionMenu">
            <button class="menu-btn" onclick="triggerEdit()">
                <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                Редагувати
            </button>
            <button class="menu-btn red" onclick="triggerDelete()">
                <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                Видалити
            </button>
        </div>

        <div class="detail-img-box">
            <img id="detImg" src="">
        </div>
        
        <div class="detail-content">
            <div class="tags-row" style="margin-bottom: 20px;">
                <div id="detTag" class="card-tag" style="background: rgba(255,255,255,0.2);"></div>
                <div id="detPortion" class="card-tag">
                    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>
                    <span></span>
                </div>
            </div>
            <div id="detTitle" class="detail-title"></div>
            
            <div class="section-header">
                <div class="section-title">
                    <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line></svg>
                    Інгредієнти
                </div>
                <button class="text-btn" onclick="resetIngredients()">Скинути</button>
            </div>
            <div id="detIng"></div>
            
            <div class="section-header">
                <div class="section-title">
                    <svg viewBox="0 0 24 24"><path d="M12 2v20"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    Приготування
                </div>
            </div>
            <div id="detSteps" class="plain-text-steps"></div>
        </div>
    </div>

    <div id="formModal" class="ios-sheet">
        <div class="form-header">
            <h2 id="formTitle">Створити</h2>
            <button class="circle-btn" style="width: 48px; height: 48px; background: rgba(255,255,255,0.1);" onclick="closeForm()">
                <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <div class="form-scroll-area">
            <div class="input-group">
                <label class="input-label">Назва страви</label>
                <input type="text" id="recipeTitle" placeholder="Сирники">
            </div>

            <div class="row-2">
                <div class="input-group">
                    <label class="input-label">Категорія</label>
                    <select id="recipeCat">
                        <option value="Загальне">Загальне</option>
                        <option value="Сніданок">Сніданок</option>
                        <option value="Протеїн">Протеїн</option>
                    </select>
                </div>
                <div class="input-group">
                    <label class="input-label">Порція</label>
                    <select id="recipePortion">
                        <option value="1 порція">1 порція</option>
                        <option value="2 порції" selected>2 порції</option>
                        <option value="3 порції">3 порції</option>
                        <option value="4 порції">4 порції</option>
                        <option value="На компанію">На компанію</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">Обкладинка (URL)</label>
                <input type="text" id="recipePhoto" placeholder="Посилання на картинку">
            </div>

            <div class="input-group">
                <label class="input-label">Список продуктів</label>
                <textarea id="recipeIng" rows="5" placeholder="Кожен інгредієнт з нового рядка..."></textarea>
            </div>

            <div class="input-group">
                <label class="input-label">Процес готування</label>
                <textarea id="recipeSteps" rows="6" placeholder="Опис процесу..."></textarea>
            </div>
            
            <button class="btn-main" onclick="saveRecipe()">Зберегти рецепт</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDKokz-gKpWZJV__yiYz2MzbybqZX1n-Ws",
          authDomain: "rezapp-42b6f.firebaseapp.com",
          projectId: "rezapp-42b6f",
          storageBucket: "rezapp-42b6f.firebasestorage.app",
          messagingSenderId: "23140533473",
          appId: "1:23140533473:web:66b995eee326b19cd423a0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const SECRET_KEY = "myrezept7";
        
        let allRecipes = [];
        let currentActiveCat = 'All';
        let currentDetailId = null; 
        let currentEditId = null;

        window.onload = () => { initCloud(); };

        function initCloud() {
            db.collection(SECRET_KEY).orderBy('createdAt', 'desc').onSnapshot(
                snap => {
                    allRecipes = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    renderGrid();
                    
                    if(currentDetailId) {
                        const exists = allRecipes.find(r => r.id === currentDetailId);
                        if(exists) {
                            document.getElementById('detTitle').innerText = exists.title;
                            document.getElementById('detImg').src = exists.photo || 'https://via.placeholder.com/500';
                            document.getElementById('detSteps').innerText = exists.steps;
                            
                            const portDiv = document.getElementById('detPortion');
                            if(exists.portion) {
                                portDiv.style.display = 'flex'; portDiv.querySelector('span').innerText = exists.portion;
                            } else { portDiv.style.display = 'none'; }
                        } else { closeDetail(); }
                    }
                },
                error => { alert("Помилка: " + error.message); }
            );
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            const filtered = currentActiveCat === 'All' ? allRecipes : allRecipes.filter(r => r.category === currentActiveCat);
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div style="text-align:center; color:var(--text-sec); margin-top:80px; font-size:16px; font-weight: 600;">Немає рецептів</div>';
                return;
            }

            grid.innerHTML = filtered.map((r, i) => {
                const portionHTML = r.portion ? `
                    <span class="card-tag">
                        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>
                        ${r.portion}
                    </span>` : '';

                const animDelay = i * 0.05;

                return `
                <div class="card" style="animation-delay: ${animDelay}s" onclick="openDetail('${r.id}')">
                    <div class="card-img-wrap">
                        <img src="${r.photo || 'https://images.unsplash.com/photo-1495521821757-a1efb6729352?q=80&w=600'}">
                    </div>
                    <div class="card-info">
                        <div class="card-title">${r.title}</div>
                        <div class="tags-row">
                            <span class="card-tag">${r.category}</span>
                            ${portionHTML}
                        </div>
                    </div>
                </div>`
            }).join('');
        }

        function openDetail(id) {
            currentDetailId = id;
            const r = allRecipes.find(x => x.id === id);
            
            document.getElementById('detImg').src = r.photo || 'https://images.unsplash.com/photo-1495521821757-a1efb6729352?q=80&w=800';
            document.getElementById('detTag').innerText = r.category;
            
            const portDiv = document.getElementById('detPortion');
            if(r.portion) {
                portDiv.style.display = 'flex'; portDiv.querySelector('span').innerText = r.portion;
            } else { portDiv.style.display = 'none'; }

            document.getElementById('detTitle').innerText = r.title;
            document.getElementById('detSteps').innerText = r.steps || "Немає опису.";
            
            renderIngredients(r.ingredients, id);
            
            setTimeout(() => { document.getElementById('detailView').classList.add('show'); }, 10);
        }

        function renderIngredients(textBlock, recipeId) {
            const container = document.getElementById('detIng');
            if(!textBlock) { container.innerHTML = '<div style="color:var(--text-sec)">Немає даних</div>'; return; }
            
            const lines = textBlock.split('\n').filter(l => l.trim().length > 0);
            const savedChecks = JSON.parse(localStorage.getItem('rezapp_chk_' + recipeId) || '[]');

            container.innerHTML = lines.map((line, idx) => {
                const isChecked = savedChecks.includes(idx) ? 'done' : '';
                return `
                <div class="check-item ${isChecked}" onclick="toggleCheck('${recipeId}', ${idx}, this)">
                    <div class="custom-checkbox"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
                    <div class="check-text">${line}</div>
                </div>`;
            }).join('');
        }

        function toggleCheck(recipeId, idx, element) {
            element.classList.toggle('done');
            let savedChecks = JSON.parse(localStorage.getItem('rezapp_chk_' + recipeId) || '[]');
            if(savedChecks.includes(idx)) {
                savedChecks = savedChecks.filter(i => i !== idx); 
            } else { savedChecks.push(idx); }
            localStorage.setItem('rezapp_chk_' + recipeId, JSON.stringify(savedChecks));
        }

        function resetIngredients() {
            if(!currentDetailId) return;
            localStorage.removeItem('rezapp_chk_' + currentDetailId);
            const r = allRecipes.find(x => x.id === currentDetailId);
            renderIngredients(r.ingredients, currentDetailId);
        }

        function closeDetail() { 
            document.getElementById('detailView').classList.remove('show');
            document.getElementById('actionMenu').style.display = 'none';
            setTimeout(() => { currentDetailId = null; }, 400);
        }

        function toggleMenu() {
            const menu = document.getElementById('actionMenu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function openForm(isEdit = false) {
            if(!isEdit) {
                currentEditId = null;
                document.getElementById('formTitle').innerText = "Новий запис";
                ['recipeTitle', 'recipePhoto', 'recipeIng', 'recipeSteps'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('recipePortion').value = '2 порції';
            }
            document.getElementById('actionMenu').style.display = 'none';
            setTimeout(() => { document.getElementById('formModal').classList.add('show'); }, 10);
        }
        
        function closeForm() { 
            document.getElementById('formModal').classList.remove('show'); 
        }

        function triggerEdit() {
            const r = allRecipes.find(x => x.id === currentDetailId);
            currentEditId = r.id;
            document.getElementById('formTitle').innerText = "Редагувати";
            document.getElementById('recipeCat').value = r.category;
            document.getElementById('recipePortion').value = r.portion || '2 порції';
            document.getElementById('recipeTitle').value = r.title;
            document.getElementById('recipePhoto').value = r.photo;
            document.getElementById('recipeIng').value = r.ingredients;
            document.getElementById('recipeSteps').value = r.steps;
            openForm(true);
        }

        async function triggerDelete() {
            if(confirm('Видалити цей рецепт?')) {
                try {
                    await db.collection(SECRET_KEY).doc(currentDetailId).delete();
                    localStorage.removeItem('rezapp_chk_' + currentDetailId); 
                    closeDetail();
                } catch(error) { alert("Помилка видалення"); }
            }
        }

        async function saveRecipe() {
            const data = {
                title: document.getElementById('recipeTitle').value,
                photo: document.getElementById('recipePhoto').value,
                category: document.getElementById('recipeCat').value,
                portion: document.getElementById('recipePortion').value,
                ingredients: document.getElementById('recipeIng').value,
                steps: document.getElementById('recipeSteps').value,
                createdAt: new Date()
            };

            if(!data.title) return alert("Введіть назву!");

            try {
                if (currentEditId) {
                    await db.collection(SECRET_KEY).doc(currentEditId).update(data);
                } else {
                    await db.collection(SECRET_KEY).add(data);
                }
                closeForm();
            } catch (error) { alert("Помилка збереження!"); }
        }

        function filter(cat) {
            currentActiveCat = cat;
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.toggle('active', b.innerText === cat || (cat === 'All' && b.innerText === 'Всі рецепти'));
            });
            renderGrid();
        }
    </script>
</body>
</html>
