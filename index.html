<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#08081a">

    <link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjoiUmV6QXBwIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiIzA4MDgxYSIsInRoZW1lX2NvbG9yIjoiIzA4MDgxYSJ9">
    
    <title>RezApp</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-absolute: #08081a; 
            --glass-card: rgba(255, 255, 255, 0.04); 
            --glass-strong: rgba(255, 255, 255, 0.09);
            --border: rgba(255, 255, 255, 0.08); 
            --border-light: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-sec: rgba(255, 255, 255, 0.6);
        }

        html, body { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100vw; height: 100dvh; 
            margin: 0; padding: 0; 
            background-color: var(--bg-absolute); 
            color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overflow: hidden; 
            overscroll-behavior-y: none;
        }

        #bg-canvas, .bg-overlay {
            position: absolute; 
            top: -10vh; left: -10vw;
            width: 120vw; height: 120vh;
            z-index: -2; pointer-events: none; display: block;
        }

        .bg-overlay {
            background: rgba(8, 8, 26, 0.4); 
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            z-index: -1;
        }

        svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }

        .app-container {
            position: absolute; 
            inset: 0;
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
            z-index: 1;
        }

        .scrollable-content {
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: env(safe-area-inset-top) 0 calc(100px + env(safe-area-inset-bottom)) 0;
            box-sizing: border-box;
        }

        header { 
            padding: 20px 20px 10px 20px;
            display: flex; justify-content: space-between; align-items: center; 
        }
        .logo { font-size: 32px; font-weight: 800; letter-spacing: -1px; display: flex; align-items: center; gap: 10px; text-shadow: 0 2px 10px rgba(0,0,0,0.5);}
        .logo svg { width: 28px; height: 28px; stroke-width: 2.5; }

        .search-wrap { padding: 10px 20px 5px 20px; }
        .search-box {
            display: flex; align-items: center; gap: 12px;
            background: var(--glass-card); 
            border: 1px solid var(--border); border-top: 1px solid var(--border-light); 
            border-radius: 20px; padding: 14px 18px;
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15); 
            transition: 0.3s; position: relative;
        }
        .search-box:focus-within { 
            background: var(--glass-strong); 
            border-color: rgba(255, 255, 255, 0.25);
        }
        .search-box svg { color: var(--text-sec); width: 22px; height: 22px; margin-left: 4px; flex-shrink: 0;}
        
        .search-box input {
            background: transparent !important; 
            -webkit-appearance: none !important; appearance: none !important;
            border: none !important; outline: none !important; box-shadow: none !important;
            color: var(--text-main); font-size: 16px; width: 100%;
            padding: 0; margin: 0; font-weight: 500; font-family: inherit;
        }
        .search-box input::placeholder { color: var(--text-sec); }
        
        .search-clear {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.15); border: none; color: var(--text-main); 
            padding: 6px; border-radius: 50%; 
            cursor: pointer; opacity: 0; visibility: hidden; transition: 0.3s; z-index: 2;
            display: flex; align-items: center; justify-content: center;
        }
        .search-clear:active { transform: translateY(-50%) scale(0.9); background: rgba(255, 255, 255, 0.25); }
        .search-clear svg { width: 14px; height: 14px; stroke-width: 3; margin: 0; }

        .categories-wrap { padding: 15px 0 20px 0; } 
        .categories { 
            display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; 
            padding: 0 20px; 
        }
        .categories::-webkit-scrollbar { display: none; }
        .categories::after { content: ''; padding-right: 20px; } 
        
        .cat-btn { 
            background: var(--glass-card); 
            border: 1px solid var(--border); border-top: 1px solid var(--border-light);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 24px; border-radius: 100px; color: var(--text-sec); 
            font-size: 15px; font-weight: 600; transition: 0.3s; cursor: pointer; white-space: nowrap;
        }
        .cat-btn.active { background: #fff; color: #000; box-shadow: 0 4px 20px rgba(255,255,255,0.3); border-color: #fff; }

        .grid { display: flex; flex-direction: column; gap: 18px; padding: 0 20px 40px; }
        .card {
            display: flex; align-items: center; gap: 16px;
            background: var(--glass-card); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-top: 1px solid var(--border-light); border-left: 1px solid var(--border-light); 
            border-radius: 28px; padding: 14px;
            cursor: pointer; transition: transform 0.2s, opacity 0.6s, background 0.2s;
            opacity: 0; animation: slideInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card:active { transform: scale(0.96); background: var(--glass-strong); }
        @keyframes slideInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .card-img-wrap { width: 115px; height: 115px; border-radius: 20px; overflow: hidden; flex-shrink: 0; background: rgba(0,0,0,0.2); }
        .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .card:hover .card-img-wrap img { transform: scale(1.08); }
        
        .card-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .card-title { font-size: 19px; font-weight: 700; line-height: 1.25; margin-bottom: 12px; letter-spacing: -0.3px; text-shadow: 0 2px 5px rgba(0,0,0,0.5);}
        
        .tags-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .card-tag { 
            font-size: 10px; font-weight: 700; text-transform: uppercase; 
            background: rgba(255,255,255,0.1); padding: 6px 10px; border-radius: 8px; 
            color: #fff; letter-spacing: 0.5px; display: flex; align-items: center; gap: 4px;
            border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(10px);
        }
        .card-tag svg { width: 12px; height: 12px; stroke-width: 2.5;}

        .ios-sheet {
            position: fixed; 
            inset: 0;
            width: 100vw; height: 100dvh;
            background: rgba(8,8,26,0.95); backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
            z-index: 1000; overflow-y: auto; overflow-x: hidden;
            transform: translateY(100%); 
            transition: transform 0.45s cubic-bezier(0.32, 0.72, 0, 1);
            will-change: transform;
        }
        .ios-sheet.show { transform: translateY(0); }

        .drag-handle {
            width: 45px; height: 6px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            position: absolute;
            top: calc(15px + env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .detail-img-box { 
            position: relative; 
            height: 55vh; width: 100%; 
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; 
            overflow: hidden; z-index: 1;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .detail-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .detail-img-box::after { 
            content:''; position: absolute; inset: 0; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 40%, rgba(8,8,26,0.95) 95%, rgba(8,8,26,1) 100%); 
        }
        
        .detail-content { 
            padding: 0 24px calc(60px + env(safe-area-inset-bottom)) 24px; 
            position: relative; z-index: 2; 
            margin-top: -70px; 
        }
        .detail-title { font-size: 36px; font-weight: 800; margin: 15px 0 30px 0; line-height: 1.1; letter-spacing: -1px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin: 45px 0 24px; }
        .section-title { font-size: 22px; color: var(--text-main); font-weight: 800; display: flex; align-items: center; gap: 12px;}
        .section-title svg { color: var(--text-sec); stroke-width: 2;}
        
        .text-btn { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: var(--text-main); 
            font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; 
            padding: 8px 16px; border-radius: 100px; transition: 0.2s;
        }
        .text-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.2); }

        .check-item { 
            display: flex; align-items: flex-start; gap: 16px; margin-bottom: 14px; cursor: pointer; 
            padding: 22px; background: var(--glass-card); border-radius: 24px; 
            border: 1px solid var(--border); border-top: 1px solid var(--border-light); 
            transition: 0.3s;
        }
        .check-item:active { transform: scale(0.98); background: var(--glass-strong); }
        .check-item.done { opacity: 0.4; border-color: transparent; background: rgba(0,0,0,0.2);}
        .check-item.done .check-text { text-decoration: line-through; color: var(--text-sec); }
        
        .custom-checkbox { 
            width: 28px; height: 28px; border: 2px solid var(--text-sec); border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.2s; 
        }
        .custom-checkbox svg { opacity: 0; width: 16px; height: 16px; stroke-width: 4; transform: scale(0.3); transition: 0.3s; }
        .check-item.done .custom-checkbox { background: var(--text-main); border-color: var(--text-main); color: #000; }
        .check-item.done .custom-checkbox svg { opacity: 1; transform: scale(1); }
        
        .check-text { font-size: 17px; line-height: 1.5; padding-top: 2px; font-weight: 600; }

        .plain-text-steps { 
            font-size: 18px; line-height: 1.8; white-space: pre-line; color: rgba(255,255,255,0.95); 
            background: var(--glass-card); padding: 28px; border-radius: 30px; 
            border: 1px solid var(--border); border-top: 1px solid var(--border-light);
        }

        .bottom-actions {
            margin-top: 50px; padding-top: 30px; border-top: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 12px;
        }
        .action-btn {
            background: rgba(255,255,255,0.05); color: var(--text-main); border: none;
            padding: 18px; border-radius: 20px; font-size: 16px; font-weight: 600; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            transition: 0.2s; border: 1px solid rgba(255,255,255,0.05);
        }
        .action-btn:active { transform: scale(0.98); background: rgba(255,255,255,0.1); }
        .action-btn.red { color: #ff453a; background: rgba(255, 69, 58, 0.1); border-color: rgba(255, 69, 58, 0.2);}
        .action-btn.red:active { background: rgba(255, 69, 58, 0.2); }

        .form-header { 
            padding: calc(20px + env(safe-area-inset-top)) 20px 20px 20px;
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(8,8,26,0.95); backdrop-filter: blur(30px); position: sticky; top: 0; z-index: 10;
        }
        .form-header h2 { font-size: 30px; font-weight: 800;}
        .form-scroll-area { padding: 30px 20px calc(120px + env(safe-area-inset-bottom)) 20px; }
        
        .input-group { margin-bottom: 26px; }
        .input-label { font-size: 12px; color: var(--text-main); margin-bottom: 12px; display: block; font-weight: 700; padding-left: 6px; text-transform: uppercase; letter-spacing: 1px;}
        
        input, textarea, select { 
            width: 100%; padding: 22px 24px; background: var(--glass-card); 
            border: 1px solid var(--border); border-top: 1px solid var(--border-light); 
            border-radius: 22px; color: var(--text-main); font-size: 17px; outline: none; transition: 0.3s;
            -webkit-appearance: none; font-weight: 600; box-sizing: border-box;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); font-family: inherit;
        }
        input:focus, textarea:focus, select:focus { border-color: rgba(255,255,255,0.5); background: var(--glass-strong); }
        
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        
        .btn-main { 
            background: var(--text-main); color: #000; padding: 24px; border-radius: 24px; 
            width: 100%; font-weight: 800; border: none; font-size: 18px; cursor: pointer; margin-top: 20px; transition: 0.3s;
        }
        .btn-main:active { transform: scale(0.96); }
        
        .fab {
            position: fixed; 
            bottom: calc(20px + env(safe-area-inset-bottom)); 
            left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.12); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.25); border-top: 1px solid rgba(255,255,255,0.6);
            color: var(--text-main); 
            width: 70px; height: 70px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); z-index: 90; cursor: pointer; transition: 0.3s;
        }
        .fab svg { width: 34px; height: 34px; stroke-width: 2; }
        .fab:active { transform: translateX(-50%) scale(0.9); background: rgba(255, 255, 255, 0.25); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="bg-overlay"></div>

    <div class="app-container">
        <div class="scrollable-content">

            <header>
                <div class="logo">
                    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                    RezApp
                </div>
            </header>

            <div class="search-wrap">
                <div class="search-box">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="searchInput" placeholder="Знайти страву..." oninput="onSearchInput()">
                    <button id="searchClear" class="search-clear" onclick="clearSearch()">
                        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
            </div>

            <div class="categories-wrap">
                <div class="categories">
                    <button class="cat-btn active" onclick="filter('All')">Всі рецепти</button>
                    <button class="cat-btn" onclick="filter('Загальне')">Загальне</button>
                    <button class="cat-btn" onclick="filter('Сніданок')">Сніданок</button>
                    <button class="cat-btn" onclick="filter('Протеїн')">Протеїн</button>
                </div>
            </div>

            <div class="grid" id="grid"></div>

        </div>
    </div>

    <button class="fab" onclick="openForm()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>

    <!-- решта коду (detailView, formModal та скрипт) залишається без змін -->

    <div id="detailView" class="ios-sheet">
        <div class="drag-handle"></div>
        
        <div class="detail-img-box">
            <img id="detImg" src="" onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1495521821757-a1efb6729352?q=80&w=800';">
        </div>
        
        <div class="detail-content">
            <div class="tags-row" style="margin-bottom: 20px;">
                <div id="detTag" class="card-tag"></div>
                <div id="detPortion" class="card-tag">
                    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>
                    <span></span>
                </div>
            </div>
            <div id="detTitle" class="detail-title"></div>
            
            <div class="section-header">
                <div class="section-title">
                    <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line></svg>
                    Інгредієнти
                </div>
                <button class="text-btn" onclick="resetIngredients()">Скинути</button>
            </div>
            <div id="detIng"></div>
            
            <div class="section-header">
                <div class="section-title">
                    <svg viewBox="0 0 24 24"><path d="M12 2v20"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    Приготування
                </div>
            </div>
            <div id="detSteps" class="plain-text-steps"></div>

            <div class="bottom-actions">
                <button class="action-btn" onclick="triggerEdit()">
                    <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    Редагувати рецепт
                </button>
                <button class="action-btn red" onclick="triggerDelete()">
                    <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    Видалити
                </button>
            </div>
        </div>
    </div>

    <div id="formModal" class="ios-sheet">
        <div class="form-header">
            <h2 id="formTitle">Створити</h2>
            <button style="width: 44px; height: 44px; background:rgba(255,255,255,0.1); border-radius:50%; border:none; color:white; display:flex; align-items:center; justify-content:center; cursor: pointer;" onclick="closeForm()">
                <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <div class="form-scroll-area">
            <div class="input-group">
                <label class="input-label">Назва страви</label>
                <input type="text" id="recipeTitle" placeholder="Сирники">
            </div>

            <div class="row-2">
                <div class="input-group">
                    <label class="input-label">Категорія</label>
                    <select id="recipeCat">
                        <option value="Загальне">Загальне</option>
                        <option value="Сніданок">Сніданок</option>
                        <option value="Протеїн">Протеїн</option>
                    </select>
                </div>
                <div class="input-group">
                    <label class="input-label">Порція</label>
                    <select id="recipePortion">
                        <option value="1 порція">1 порція</option>
                        <option value="2 порції" selected>2 порції</option>
                        <option value="3 порції">3 порції</option>
                        <option value="4 порції">4 порції</option>
                        <option value="На компанію">На компанію</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">Обкладинка (URL)</label>
                <input type="text" id="recipePhoto" placeholder="Посилання на картинку">
            </div>

            <div class="input-group">
                <label class="input-label">Список продуктів</label>
                <textarea id="recipeIng" rows="5" placeholder="Кожен інгредієнт з нового рядка..."></textarea>
            </div>

            <div class="input-group">
                <label class="input-label">Процес готування</label>
                <textarea id="recipeSteps" rows="6" placeholder="Опис процесу..."></textarea>
            </div>
            
            <button class="btn-main" onclick="saveRecipe()">Зберегти рецепт</button>
        </div>
    </div>

    <script>
        // ────────────────────────────────────────────────
        // Ваш JavaScript-код залишається без змін
        // (він вже добре написаний, проблема була тільки в CSS-структурі)
        // ────────────────────────────────────────────────

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        let W, H;

        function resizeCanvas() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));
        resizeCanvas();

        const orbs = [
            { x: 0.15, y: 0.20, r: 0.70, color: [180, 136, 255], speed: 0.00016, phase: 0.0, moveX: 0.20, moveY: 0.15 },
            { x: 0.55, y: 0.55, r: 0.55, color: [180, 136, 255], speed: 0.00009, phase: 3.3, moveX: 0.14, moveY: 0.18 },
            { x: 0.85, y: 0.80, r: 0.65, color: [255, 143, 171], speed: 0.00012, phase: 1.6, moveX: 0.18, moveY: 0.20 },
            { x: 0.78, y: 0.18, r: 0.45, color: [255, 143, 171], speed: 0.00014, phase: 5.0, moveX: 0.15, moveY: 0.12 },
        ];

        function renderCanvas(ts) {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#08081a'; 
            ctx.fillRect(0, 0, W, H);
            ctx.globalCompositeOperation = 'screen';

            for (let i = 0; i < orbs.length; i++) {
                let o = orbs[i];
                let cx = (o.x + Math.sin(ts * o.speed + o.phase) * o.moveX) * W;
                let cy = (o.y + Math.cos(ts * o.speed * 0.83 + o.phase) * o.moveY) * H;
                let radius = o.r * Math.min(W, H);

                let grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
                grad.addColorStop(0, `rgba(${o.color[0]}, ${o.color[1]}, ${o.color[2]}, 0.82)`);
                grad.addColorStop(0.40, `rgba(${o.color[0]}, ${o.color[1]}, ${o.color[2]}, 0.48)`);
                grad.addColorStop(0.75, `rgba(${o.color[0]}, ${o.color[1]}, ${o.color[2]}, 0.14)`);
                grad.addColorStop(1, `rgba(${o.color[0]}, ${o.color[1]}, ${o.color[2]}, 0)`);

                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();
            }
            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(renderCanvas);
        }
        requestAnimationFrame(renderCanvas);

        const firebaseConfig = {
          apiKey: "AIzaSyDKokz-gKpWZJV__yiYz2MzbybqZX1n-Ws",
          authDomain: "rezapp-42b6f.firebaseapp.com",
          projectId: "rezapp-42b6f",
          storageBucket: "rezapp-42b6f.firebasestorage.app",
          messagingSenderId: "23140533473",
          appId: "1:23140533473:web:66b995eee326b19cd423a0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const SECRET_KEY = "myrezept7";
        
        let allRecipes = [];
        let currentActiveCat = 'All';
        let currentSearchQuery = '';
        let currentDetailId = null; 
        let currentEditId = null;

        window.onload = () => { initCloud(); };

        function initCloud() {
            db.collection(SECRET_KEY).orderBy('createdAt', 'desc').onSnapshot(
                snap => {
                    allRecipes = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    renderGrid();
                    
                    if(currentDetailId) {
                        const exists = allRecipes.find(r => r.id === currentDetailId);
                        if(exists) {
                            document.getElementById('detTitle').innerText = exists.title;
                            document.getElementById('detImg').src = exists.photo || 'https://images.unsplash.com/photo-1495521821757-a1efb6729352?q=80&w=800';
                            document.getElementById('detSteps').innerText = exists.steps || "Немає опису.";
                            
                            const portDiv = document.getElementById('detPortion');
                            if(exists.portion) {
                                portDiv.style.display = 'flex'; portDiv.querySelector('span').innerText = exists.portion;
                            } else { portDiv.style.display = 'none'; }
                        } else { closeDetail(); }
                    }
                }
            );
        }

        function onSearchInput() {
            const input = document.getElementById('searchInput');
            currentSearchQuery = input.value.toLowerCase();
            const clearBtn = document.getElementById('searchClear');
            if (currentSearchQuery.length > 0) {
                clearBtn.style.visibility = 'visible'; clearBtn.style.opacity = '1';
            } else {
                clearBtn.style.visibility = 'hidden'; clearBtn.style.opacity = '0';
            }
            renderGrid();
        }

        function clearSearch() {
            const input = document.getElementById('searchInput');
            input.value = ''; currentSearchQuery = '';
            document.getElementById('searchClear').style.visibility = 'hidden';
            document.getElementById('searchClear').style.opacity = '0';
            input.focus(); renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            const filtered = allRecipes.filter(r => {
                const matchCategory = currentActiveCat === 'All' || r.category === currentActiveCat;
                const matchSearch = r.title.toLowerCase().includes(currentSearchQuery);
                return matchCategory && matchSearch;
            });
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div style="text-align:center; color:var(--text-sec); margin-top:60px; font-size:16px; font-weight: 500;">Нічого не знайдено 🤷‍♂️</div>';
                return;
            }

            const fallbackImg = "https://images.unsplash.com/photo-1495521821757-a1efb6729352?q=80&w=600";

            grid.innerHTML = filtered.map((r, i) => {
                const portionHTML = r.portion ? `<span class="card-tag"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>${r.portion}</span>` : '';
                return `
                <div class="card" style="animation-delay: ${i * 0.05}s" onclick="openDetail('${r.id}')">
                    <div class="card-img-wrap"><img src="${r.photo || fallbackImg}" onerror="this.onerror=null;this.src='${fallbackImg}';"></div>
                    <div class="card-info">
                        <div class="card-title">${r.title}</div>
                        <div class="tags-row"><span class="card-tag">${r.category}</span>${portionHTML}</div>
                    </div>
                </div>`;
            }).join('');
        }

        function openDetail(id) {
            currentDetailId = id;
            const r = allRecipes.find(x => x.id === id);
            
            const fallbackImg = "https://images.unsplash.com/photo-1495521821757-a1efb6729352?q=80&w=800";
            const imgEl = document.getElementById('detImg');
            imgEl.src = r.photo || fallbackImg;
            imgEl.onerror = () => { imgEl.src = fallbackImg; };
            
            document.getElementById('detTag').innerText = r.category;
            
            const portDiv = document.getElementById('detPortion');
            if(r.portion) { portDiv.style.display = 'flex'; portDiv.querySelector('span').innerText = r.portion; } 
            else { portDiv.style.display = 'none'; }

            document.getElementById('detTitle').innerText = r.title;
            document.getElementById('detSteps').innerText = r.steps || "Немає опису.";
            
            renderIngredients(r.ingredients, id);
            
            const sheet = document.getElementById('detailView');
            sheet.style.transition = 'transform 0.45s cubic-bezier(0.32, 0.72, 0, 1)';
            sheet.style.transform = ''; 
            setTimeout(() => { sheet.classList.add('show'); }, 10);
        }

        function renderIngredients(textBlock, recipeId) {
            const container = document.getElementById('detIng');
            if(!textBlock) { container.innerHTML = '<div style="color:var(--text-sec)">Немає даних</div>'; return; }
            
            const lines = textBlock.split('\n').filter(l => l.trim().length > 0);
            const savedChecks = JSON.parse(localStorage.getItem('rezapp_chk_' + recipeId) || '[]');

            container.innerHTML = lines.map((line, idx) => {
                const isChecked = savedChecks.includes(idx) ? 'done' : '';
                return `
                <div class="check-item ${isChecked}" onclick="toggleCheck('${recipeId}', ${idx}, this)">
                    <div class="custom-checkbox"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
                    <div class="check-text">${line}</div>
                </div>`;
            }).join('');
        }

        function toggleCheck(recipeId, idx, element) {
            element.classList.toggle('done');
            let savedChecks = JSON.parse(localStorage.getItem('rezapp_chk_' + recipeId) || '[]');
            if(savedChecks.includes(idx)) { savedChecks = savedChecks.filter(i => i !== idx); } 
            else { savedChecks.push(idx); }
            localStorage.setItem('rezapp_chk_' + recipeId, JSON.stringify(savedChecks));
        }

        function resetIngredients() {
            if(!currentDetailId) return;
            localStorage.removeItem('rezapp_chk_' + currentDetailId);
            const r = allRecipes.find(x => x.id === currentDetailId);
            renderIngredients(r.ingredients, currentDetailId);
        }

        function closeDetail() { 
            const sheet = document.getElementById('detailView');
            sheet.style.transition = 'transform 0.4s cubic-bezier(0.32, 0.72, 0, 1)';
            sheet.style.transform = 'translateY(100%)'; 
            
            setTimeout(() => { 
                sheet.classList.remove('show'); 
                sheet.style.transform = ''; 
                currentDetailId = null; 
            }, 400);
        }

        function openForm(isEdit = false) {
            if(!isEdit) {
                currentEditId = null;
                document.getElementById('formTitle').innerText = "Новий запис";
                ['recipeTitle', 'recipePhoto', 'recipeIng', 'recipeSteps'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('recipePortion').value = '2 порції';
            }
            const modal = document.getElementById('formModal');
            modal.style.transition = 'transform 0.45s cubic-bezier(0.32, 0.72, 0, 1)';
            modal.style.transform = '';
            setTimeout(() => { modal.classList.add('show'); }, 10);
        }
        
        function closeForm() { 
            const modal = document.getElementById('formModal');
            modal.style.transition = 'transform 0.4s cubic-bezier(0.32, 0.72, 0, 1)';
            modal.style.transform = 'translateY(100%)'; 
            setTimeout(() => { 
                modal.classList.remove('show'); 
                modal.style.transform = ''; 
            }, 400);
        }

        function triggerEdit() {
            const r = allRecipes.find(x => x.id === currentDetailId);
            currentEditId = r.id;
            document.getElementById('formTitle').innerText = "Редагувати";
            document.getElementById('recipeCat').value = r.category;
            document.getElementById('recipePortion').value = r.portion || '2 порції';
            document.getElementById('recipeTitle').value = r.title;
            document.getElementById('recipePhoto').value = r.photo;
            document.getElementById('recipeIng').value = r.ingredients;
            document.getElementById('recipeSteps').value = r.steps;
            openForm(true);
        }

        async function triggerDelete() {
            if(confirm('Видалити цей рецепт?')) {
                try {
                    await db.collection(SECRET_KEY).doc(currentDetailId).delete();
                    localStorage.removeItem('rezapp_chk_' + currentDetailId); 
                    closeDetail();
                } catch(error) {}
            }
        }

        async function saveRecipe() {
            const data = {
                title: document.getElementById('recipeTitle').value,
                photo: document.getElementById('recipePhoto').value,
                category: document.getElementById('recipeCat').value,
                portion: document.getElementById('recipePortion').value,
                ingredients: document.getElementById('recipeIng').value,
                steps: document.getElementById('recipeSteps').value,
                createdAt: new Date()
            };

            if(!data.title) return alert("Введіть назву!");

            if (currentEditId) await db.collection(SECRET_KEY).doc(currentEditId).update(data);
            else await db.collection(SECRET_KEY).add(data);
            closeForm();
        }

        function filter(cat) {
            currentActiveCat = cat;
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.toggle('active', b.innerText === cat || (cat === 'All' && b.innerText === 'Всі рецепти'));
            });
            renderGrid();
        }

        // Свайп вниз для закриття детального перегляду
        const sheet = document.getElementById('detailView');
        let startY = 0;
        let currentTranslate = 0;
        let isDragging = false;

        sheet.addEventListener('touchstart', (e) => {
            if (sheet.scrollTop <= 0) {
                startY = e.touches[0].clientY;
                isDragging = true;
                currentTranslate = 0;
                sheet.style.transition = 'none'; 
            }
        }, {passive: true});

        sheet.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const y = e.touches[0].clientY;
            const dy = y - startY;

            if (dy > 0) {
                currentTranslate = dy;
                sheet.style.transform = `translateY(${dy}px)`;
                if (e.cancelable) e.preventDefault(); 
            } else {
                currentTranslate = 0;
                sheet.style.transform = `translateY(0px)`;
                isDragging = false; 
            }
        }, {passive: false});

        sheet.addEventListener('touchend', (e) => {
            if (!isDragging && currentTranslate === 0) return;
            isDragging = false;
            
            if (currentTranslate > 120) { 
                closeDetail();
            } else { 
                sheet.style.transition = 'transform 0.4s cubic-bezier(0.32, 0.72, 0, 1)';
                sheet.style.transform = 'translateY(0)';
            }
            currentTranslate = 0;
        });
    </script>
</body>
</html>
